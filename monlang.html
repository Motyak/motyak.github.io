<!-- Bottom view -->
<div class="flex 2xl:h-screen justify-center items-center">
    <video width="1920" height="1080" controls preload="metadata">
        <source src="1080p_v2.mp4" type="video/mp4">
    </video>
</div>

<script>
    let g_autoroll = true // accordion autoroll (<> repeat selected video)

    {
        const checkViewportWidth = () => {
            let targetWidth = 1920 / window.devicePixelRatio
            if (window.innerWidth < targetWidth) {
                $("video").each((_index, video) => {
                    $(video).css({
                        "width": "100vw",
                        "height": "auto",
                        /* remove them basically */
                        "min-width": "",
                        "max-width": "",
                        "min-height": "",
                        "max-height": "",
                    })
                })
            }
            else {
                $("video").each((_index, video) => {
                    $(video).css({
                        "min-width": `${$(video).attr("width") / window.devicePixelRatio}`,
                        "max-width": `${$(video).attr("width") / window.devicePixelRatio}`,
                        "min-height": `${$(video).attr("height") / window.devicePixelRatio}`,
                        "max-height": `${$(video).attr("height") / window.devicePixelRatio}`,
                        /* remove them basically */
                        "width": "",
                        "height": "",
                    })
                })
            }
        }
        window.addEventListener("resize", checkViewportWidth)
        checkViewportWidth() // initial call
    }

    $(document).ready(() => {
        $("ul").each((_index, ul) => {
            $(ul).on("click", "h1", (event, my_context) => {
                let h1 = event.currentTarget

                /* early exit if already expanded */
                if ($(h1).hasClass("font-bold")) {
                    return // nothing to do
                }

                if (my_context !== "from autoroll") {
                    g_autoroll = false // disable autoroll permanently
                }

                /* handle video */
                {
                    let videos = $(ul).parent().find("video")

                    /* first, we hide&pause all videos */
                    $(videos).each((_index, video) => {
                        $(video).hide()
                        video.pause()
                    })

                    /* then,  we play&show the appropriate video */
                    let index = Number($(h1).attr("name"))
                    videos[index].currentTime = 0 // should we ?
                    videos[index].play()
                    $(videos[index]).show()
                }

                /* handle accordion menu item */
                {
                    /* first, we collapse all paragraphs */
                    $(ul).find("h1").each((_index, h1) => $(h1).removeClass("font-bold"))
                    $(ul).find("p").each((_index, p) => $(p).animate({height: "hide", opacity: "hide", margin: "hide"}, 300))

                    /* then, we expand the one clicked */
                    $(h1)
                        .addClass("font-bold")
                        .next() /* <p> */
                        .animate({height: "show", opacity: "show", margin: "show"}, 300)
                }
            })
        })

        $("#landing_view").find("video").each((_index, video) => {
            $(video).on("ended", (event) => {
                let video = event.currentTarget
                if (g_autoroll) {
                    /* plays the next one (or go back to first)..
                    ..and select corresponding accordion item*/
                    let videos = $(video).parent().find("video")
                    let nextIndex = (Number($(video).attr("name")) + 1) % videos.length
                    let nextVideo = videos[nextIndex]
                    let nextH1 = $(video).parent().find("h1")[nextIndex]
                    $(video).hide()
                    $(nextVideo).show()
                    $(nextH1).trigger("click", /*my_context*/["from autoroll"])
                    // nextVideo.load() // ugly blank
                    nextVideo.play()
                }
                else {
                    /* repeat itself */
                    // video.load() // ugly blank
                    video.play()
                }
            })
        })

        $("#downarrow").click(() => {
            $("body").animate({
                scrollTop: $(window).height()
            }, 1000)
        })
    })
</script>
