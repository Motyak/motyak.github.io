
<div>

<!-- 1..30  -->
<table></table>

<!-- 31..60 -->
<table></table>

<!-- 61..90 -->
<table></table>

</div>

<script>

let tables = document.querySelectorAll("table")

// initialize rows
for (let i = 0; i < 90; ++i) {
    let table_i = tables[Math.floor(i / 30)]
    let n = i + 1
    table_i.insertRow().insertCell().textContent = n
}

filter(n => Math.floor(n / 10) + n % 10 < 10)
filter(n => n % 10 != 0)

foreach(n => createCell(n * 11 - 1))
foreach(n => createCell((n + 1) * 999))
foreach(n => {
    let res = "0."
    let decimal = String(n / 999_999)
    res += `<span>${decimal.substring(2, 8)}</span>`
    res += `${decimal.substring(2, 6)}...`
    return createCell(res)
})

function filter(pred) {
    for (let i = 0; i < 90; ++i) {
        let table_i = tables[Math.floor(i / 30)]
        let row_i = i % 30
        let n = i + 1
        if (!pred(n)) {
            table_i.rows[row_i].classList.add("s")
        }
    }
}

function foreach(fn) {
    for (let i = 0; i < 90; ++i) {
        let table_i = tables[Math.floor(i / 30)]
        let row_i = i % 30
        if (table_i.rows[row_i].classList.contains("s")) {
            table_i.rows[row_i].insertCell()
        }
        else {            
            let cells = table_i.rows[row_i].cells
            let last_cell = cells[cells.length - 1]
            let new_cell = fn(Number(last_cell.innerText))
            table_i.rows[row_i].appendChild(new_cell)
        }
    }
}

function createCell(html) {
    return Object.assign(document.createElement("td"), {innerHTML: html})
}

</script>

<script>

const checkAspectRatio = () => {
    let width = window.innerWidth
    let height = window.innerHeight
    let aspectRatio = width / height

    let div = document.querySelector("div")
    div.style.display = aspectRatio < 1.3? "block" : "flex"
}
window.addEventListener("resize", checkAspectRatio)
checkAspectRatio() // initial call

</script>

<style>

div {
    display: flex;
    flex-direction: row;
    gap: 50px;
}

table {
    border-collapse: collapse;
    flex-shrink: 0;
}

tr.s td {
    position: relative;
    color: #888;
}

tr.s td::before {
    content: " ";
    position: absolute;
    top: 50%;
    width: 100%;
    border-bottom: 2px solid red;
}

tr:not(.s) td:not(:last-child)::after {
    content: " => ";
    margin: 0 10px;
}

tr:not(.s) td {
    text-align: right;
}

/* repeating decimals */
span {
    text-decoration: overline;
}

</style>
